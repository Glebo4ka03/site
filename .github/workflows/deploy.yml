name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Даём права на запись
    permissions:
      contents: write
    
    steps:
      # Шаг 1: Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Настраиваем Node.js (опционально)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Шаг 3: (Опционально) Сборка — пропускаем, у нас статика
      
      # Шаг 4: Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
